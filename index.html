<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>急診熊心聲 Podcast</title>
<style>
  :root{--bg:#1a1a2e;--card:#23233f;--accent:#ff7a45;--text:#f2f2f7;--mut:#a9a9c0}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;line-height:1.7}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px}
  header{text-align:center;margin-bottom:28px}
  header img{width:200px;height:200px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  h1{font-size:1.5rem;margin:18px 0 4px} .sub{color:var(--mut);font-size:.95rem}
  .card{background:var(--card);border-radius:16px;padding:22px;margin:18px 0}
  .ep-title{font-size:1.2rem;font-weight:700;margin:0 0 6px}
  .meta{color:var(--mut);font-size:.85rem;margin-bottom:14px}
  audio{width:100%;margin:8px 0}
  .warn{background:#3a2a1a;border-left:3px solid var(--accent);padding:12px 14px;border-radius:8px;font-size:.9rem;color:#ffd9c2;margin:14px 0}
  a{color:var(--accent)} .links a{display:inline-block;margin-right:16px;font-size:.9rem}
  .feed{font-size:.8rem;color:var(--mut);word-break:break-all;margin-top:24px;text-align:center}
  h3{font-size:1rem;margin:20px 0 8px;color:var(--accent)}
  ul{padding-left:20px} li{font-size:.82rem;color:var(--mut);margin:4px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="cover.jpg" alt="急診熊心聲">
    <h1>急診熊心聲</h1>
    <div class="sub">急診醫師 Bear ｜ 研究 × 查證 × 用自己的聲音講給你聽</div>
  </header>

  <div class="card">
    <div class="ep-title">EP01　美伊關係現況：三個月戰爭後的停火草案</div>
    <div class="meta">2026/5/30 ・ 約 19 分鐘 ・ AI 研究＋多重查核＋本人聲音合成</div>
    <audio controls preload="none" src="ep01-us-iran.mp3"></audio>
    <div class="warn">⚠️ 本集由 AI 協助研究＋對抗式查核後、以主持人聲音合成製作。內容僅供參考、不構成專業建議；查核可信度 82/100，引用來源見下方，歡迎自行查證。</div>
    <div class="links">
      <a href="ep01-us-iran.vtt">📄 逐字稿（VTT）</a>
      <a href="ep01-us-iran.mp3" download>⬇️ 下載音檔</a>
    </div>
  </div>

  <div class="feed">
    Podcast RSS feed：<br><a href="feed.xml">https://agoodbear.github.io/voice-podcast/feed.xml</a>
  </div>
</div>
</body>
</html>
